name: Publish npm package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Use Trusted Publishing-compatible npm
        run: npm install --global npm@11.18.0

      - name: Show release toolchain
        run: |
          node --version
          npm --version

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish package
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --provenance --registry=https://registry.npmjs.org

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node tools/release-notes.js > release-notes.md
          gh release create "$RELEASE_TAG" --title "hexo-bb-channel $RELEASE_TAG" --notes-file release-notes.md
